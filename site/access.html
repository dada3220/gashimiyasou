<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>index</title>
    <meta name="description" content="旅館予約サイトサンプル" />
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap"
      rel="stylesheet"
    />
    <script src="js/jquery-3.4.1.min.js"></script>
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/access.css" rel="stylesheet" />
    <script src="js/script.js"></script>
  </head>

  <body>
    <!-- ヘッダー読み込み -->
    <div id="header-area"></div>

    <nav class="wrapper">
      <div class="page_head">
        <h1>アクセス</h1>
        <p>access</p>
      </div>

      <main class="access_main">
        <h2>所在地</h2>
        <div class="map">
          <p>
            〒123-4567 <br />
            埼玉県 さいたま市 見沼区東大宮1-1　がしみや荘 本館 <br />
            TEL：050-12-3456
          </p>
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3229.9271150092936!2d139.63767967460032!3d35.94875287250203!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6018c6e7d703f6ed%3A0x7282e17bfc08ad7a!2z5p2x5aSn5a6u6aeF!5e0!3m2!1sja!2sjp!4v1779534160782!5m2!1sja!2sjp"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>

        <article class="a_mes">
          <h2>アクセス方法</h2>
          <div class="a_mes1">
            <h3>電車でお越しの方</h3>
            <p>東京駅から [JR山手線] →大宮[東北新幹線] →大宮駅から徒歩約10分</p>
          </div>
          <div class="a_mes2">
            <h3>車でお越しの方</h3>
            <p>[首都高速埼玉新都心線] 新都心西出入（IC）から約1.2m</p>
          </div>
        </article>

        <article class="annai" id="annai">
          <div class="page_head">
            <h1>周辺案内</h1>
            <p>tourist attraction</p>
          </div>

          <div class="a_s">
            <div class="spot">
              <h3>武蔵一宮 氷川神社</h3>
              <img src="images/syuuhen1.jpg" alt="武蔵一宮 氷川神社" />
              <p>宿から車で約15分</p>
            </div>

            <div class="spot">
              <h3>大宮盆栽村</h3>
              <img src="images/syuuhen2.jpg" alt="大宮盆栽村" />
              <p>宿から車で約10分</p>
            </div>

            <div class="spot">
              <h3>鉄道博物館</h3>
              <img src="images/syuuhen3.jpg" alt="鉄道博物館" />
              <p>宿から車で約20分</p>
            </div>

            <div class="spot">
              <h3>大宮公園</h3>
              <img src="images/syuuhen4.jpg" alt="大宮公園" />
              <p>宿から車で約10分</p>
            </div>
          </div>
        </article>
      </main>
    </nav>
    <!-- wrapper -->

    <!-- フッター読み込み -->
    <div id="footer-area"></div>
  </body>
</html>
