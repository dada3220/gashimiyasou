```html id="dbzsp2"
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>宿泊予約 | がしみや荘</title>

    <meta name="description" content="宿泊予約ページ" />

    <link rel="icon" type="image/png" href="images/favicon.png" />

    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap"
      rel="stylesheet"
    />

    <link href="css/style.css" rel="stylesheet" />
    <link href="css/reserve.css" rel="stylesheet" />
  </head>

  <body>
    <!-- ヘッダー読み込み -->
    <div id="header-area"></div>

    <div class="wrapper">
      <section class="page_head">
        <h1>宿泊予約</h1>
        <p>reserve</p>
      </section>

      <main class="reserve_main">
        <form id="reserveForm">
          <!-- =========================
         日付選択
         ========================== -->

          <section class="reserve_section">
            <h2 class="reserve_title">ご宿泊日を選択</h2>

            <div class="form_group">
              <label>チェックイン日</label>

              <input type="date" id="checkin" />
            </div>

            <div class="form_group">
              <label>チェックアウト日</label>

              <input type="date" id="checkout" />
            </div>
          </section>

          <!-- =========================
         客室選択
          ========================== -->

          <section class="reserve_section hidden" id="roomSection">
            <h2 class="reserve_title">客室タイプを選択</h2>

            <div class="room_cards">
              <!-- スタンダード -->

              <div class="room_card" data-room="standard">
                <img src="images/room01.png" alt="スタンダード" />

                <div class="room_text">
                  <h3>スタンダード</h3>

                  <p>和の落ち着きを感じる 基本客室</p>

                  <span>1〜2名</span>
                </div>
              </div>

              <!-- デラックス -->

              <div class="room_card" data-room="deluxe">
                <img src="images/room02.png" alt="デラックス" />

                <div class="room_text">
                  <h3>デラックス</h3>

                  <p>広々とした贅沢空間</p>

                  <span>1〜4名</span>
                </div>
              </div>

              <!-- スイート -->

              <div class="room_card" data-room="suite">
                <img src="images/room03.png" alt="スイート" />

                <div class="room_text">
                  <h3>スイート</h3>

                  <p>特別な滞在のための 最上級客室</p>

                  <span>1〜4名</span>
                </div>
              </div>
            </div>
          </section>

          <!-- =========================
         プラン選択
          ========================== -->

          <section class="reserve_section hidden" id="planSection">
            <h2 class="reserve_title">宿泊プランを選択</h2>

            <p id="rateLabel" class="rate_label">平日料金</p>

            <div class="plan_buttons">
              <button type="button" class="plan_btn" data-plan="normal">
                <strong> 夕朝食付き スタンダードプラン </strong>

                <span> 料金表示 </span>
              </button>

              <button type="button" class="plan_btn" data-plan="stay">
                <strong> 素泊まり お手頃プラン </strong>

                <span> 料金表示 </span>
              </button>
            </div>
          </section>

          <!-- =========================
         入力フォーム
          ========================== -->

          <section class="reserve_section hidden" id="infoSection">
            <h2 class="reserve_title">ご宿泊者情報</h2>

            <div class="form_group">
              <label>人数</label>

              <select id="people">
                <option value="">人数を選択してください</option>
              </select>
            </div>

            <div class="form_group">
              <label>お名前</label>

              <input type="text" id="name" />
            </div>

            <div class="form_group">
              <label>ふりがな</label>

              <input type="text" id="kana" />
            </div>

            <div class="form_group">
              <label>電話番号</label>

              <input type="tel" id="phone" />
            </div>

            <div class="form_group">
              <label>備考欄</label>

              <textarea id="message"></textarea>
            </div>

            <div class="price_box">
              <p>合計金額</p>

              <div id="totalPrice">¥0</div>
            </div>

            <button type="submit" class="reserve_btn">予約する</button>

            <div id="completeMessage">
              ご予約ありがとうございました。<br />

              予約を受け付けました。
            </div>
          </section>
        </form>
      </main>
    </div>

    <!-- =========================
     完了画面
    ========================= -->

    <div class="complete_overlay" id="completeOverlay">
      <div class="complete_box">
        <h2>ご予約完了</h2>

        <p>
          ご予約ありがとうございました。<br />

          ご入力いただいた内容で<br />
          ご予約を承りました。
        </p>

        <a href="index.html" class="top_btn"> TOPへ戻る </a>
      </div>
    </div>

    <!-- フッター -->
    <div id="footer-area"></div>

    <script src="js/script.js"></script>
    <script src="js/reserve.js"></script>
  </body>
</html>
